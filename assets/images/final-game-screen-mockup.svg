  <text x="130" y="155" font-family="Consolas, monospace" font-size="25" fill="#e5e7eb">Aventura del Número Secreto</text>
  <text x="130" y="205" font-family="Consolas, monospace" font-size="21" fill="#d1d5db">Hola, Luna. Tu misión es adivinar números secretos.</text>
  <text x="130" y="255" font-family="Consolas, monospace" font-size="21" fill="#93c5fd">--- Nivel: Bosque de Bits ---</text>
  <text x="130" y="305" font-family="Consolas, monospace" font-size="21" fill="#d1d5db">Intento 1/4. Escribe un número entre 1 y 10: 7</text>
  <text x="130" y="355" font-family="Consolas, monospace" font-size="21" fill="#facc15">Pista: el número secreto es menor.</text>
  <text x="130" y="405" font-family="Consolas, monospace" font-size="21" fill="#d1d5db">Vidas restantes: 5.</text>
</svg>
