<svg width="1000" height="560" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="560" rx="24" fill="#fbfbff"/>
  <text x="500" y="55" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#222">Modelo simple de clases del juego</text>
  <g font-family="Arial">
    <rect x="70" y="120" width="220" height="170" rx="16" fill="#ffffff" stroke="#222" stroke-width="3"/>
    <text x="180" y="155" text-anchor="middle" font-size="24" font-weight="700">Player</text>
    <line x1="70" y1="170" x2="290" y2="170" stroke="#222"/>
    <text x="95" y="205" font-size="18">- name</text>
    <text x="95" y="235" font-size="18">- score</text>
    <text x="95" y="265" font-size="18">- lives</text>

    <rect x="390" y="120" width="220" height="220" rx="16" fill="#ffffff" stroke="#222" stroke-width="3"/>
    <text x="500" y="155" text-anchor="middle" font-size="24" font-weight="700">Game</text>
    <line x1="390" y1="170" x2="610" y2="170" stroke="#222"/>
    <text x="415" y="205" font-size="18">- levels</text>
    <text x="415" y="235" font-size="18">- attempts</text>
    <text x="415" y="265" font-size="18">+ start()</text>
    <text x="415" y="295" font-size="18">+ playRound()</text>

    <rect x="710" y="120" width="220" height="170" rx="16" fill="#ffffff" stroke="#222" stroke-width="3"/>
    <text x="820" y="155" text-anchor="middle" font-size="24" font-weight="700">InputHelper</text>
    <line x1="710" y1="170" x2="930" y2="170" stroke="#222"/>
    <text x="735" y="205" font-size="18">+ readText()</text>
    <text x="735" y="235" font-size="18">+ readNumber()</text>

    <path d="M290 205 C330 205, 350 205, 390 205" fill="none" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M610 230 C650 230, 670 230, 710 230" fill="none" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <text x="500" y="470" text-anchor="middle" font-family="Arial" font-size="22" fill="#333">Cada clase tiene una responsabilidad clara.</text>
</svg>
